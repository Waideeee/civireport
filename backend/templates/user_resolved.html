<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Resolved - CiviReport</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; margin: 0; padding: 24px;">
    <div style="max-width: 640px; margin: 0 auto; background: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden;">
        <div style="background: #166534; color: #ffffff; padding: 24px;">
            <h1 style="margin: 0; font-size: 24px;">Account Resolved</h1>
        </div>
        <div style="padding: 24px;">
            <p style="margin-top: 0;">Hello {{ user_name }},</p>
            <p>Your account is now active and you can sign in below.</p>
            <p><a href="{{ login_url }}" style="color: #2563eb;">Go to Login</a></p>
        </div>
    </div>
</body>
</html>
